name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 0' # Sunday at 7am UTC

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: yarn
      - run: yarn ci
      - run: yarn build
      - name: Run integration tests
        run: npx vitest run tests/integration/integration.test.ts --reporter=verbose
        env:
          WINIX_USERNAME: ${{ secrets.WINIX_USERNAME }}
          WINIX_PASSWORD: ${{ secrets.WINIX_PASSWORD }}
          WINIX_DEVICE_ID: ${{ secrets.WINIX_DEVICE_ID }}

  integration-rate-limit:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: yarn
      - run: yarn ci
      - run: yarn build
      - name: Run rate limit integration tests
        run: npx vitest run tests/integration/integration-rate-limit.test.ts --reporter=verbose
        env:
          WINIX_DEVICE_ID: ${{ secrets.WINIX_DEVICE_ID }}
